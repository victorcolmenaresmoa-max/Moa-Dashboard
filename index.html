<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specialists Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-white text-[#37352f] h-screen flex flex-col overflow-hidden">

    <header class="px-12 pt-10 pb-4">
        <div class="flex items-center gap-3">
            <span class="text-4xl">👁️</span>
            <h1 class="text-[40px] font-bold tracking-tight leading-none text-[#37352f]">Specialists Dashboard</h1>
        </div>
    </header>

    <section class="px-12 border-b border-gray-200 flex justify-between items-end">
        <div class="flex gap-1 overflow-x-auto hide-scrollbar">
            <button class="flex items-center gap-2 px-3 py-2 text-sm font-medium border-b-2 border-black text-black">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> All Tasks
            </button>
            <button class="tab-btn">Current Sprint</button>
            <button class="tab-btn"><i data-lucide="calendar" class="w-4 h-4"></i> Calendar</button>
            <button class="tab-btn"><i data-lucide="gantt-chart" class="w-4 h-4"></i> Timeline</button>
            <button class="tab-btn"><i data-lucide="file-edit" class="w-4 h-4"></i> Submit a task</button>
            <button class="tab-btn"><i data-lucide="calendar-days" class="w-4 h-4"></i> Weekly Calendar</button>
            <button class="tab-btn"><i data-lucide="user-check" class="w-4 h-4"></i> My Tasks</button>
            <button class="tab-btn"><i data-lucide="clock" class="w-4 h-4"></i> Recent Updates</button>
        </div>

        <div class="flex items-center gap-3 pb-2 ml-4">
            <div class="flex items-center text-gray-500 gap-1">
                <button class="p-1 hover:bg-gray-100 rounded transition"><i data-lucide="filter" class="w-4 h-4"></i></button>
                <button class="p-1 hover:bg-gray-100 rounded transition"><i data-lucide="arrow-up-down" class="w-4 h-4"></i></button>
                <button class="p-1 hover:bg-gray-100 rounded transition"><i data-lucide="search" class="w-4 h-4"></i></button>
                <button class="p-1 hover:bg-gray-100 rounded transition"><i data-lucide="zap" class="w-4 h-4"></i></button>
            </div>
            <div class="flex items-center bg-[#007aff] hover:bg-[#0066d6] transition rounded text-white text-sm font-medium cursor-pointer">
                <span class="px-3 py-1.5 border-r border-blue-400">New</span>
                <span class="px-2 py-1.5"><i data-lucide="chevron-down" class="w-4 h-4"></i></span>
            </div>
        </div>
    </section>

    <main class="flex-1 overflow-auto relative">
        <div id="loading" class="absolute inset-0 flex justify-center items-center bg-white/80 z-20">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-gray-400"></i>
        </div>
        
        <table class="w-max min-w-full text-sm text-left border-collapse" id="notion-table">
            <thead class="text-gray-500 border-b border-gray-200 bg-white sticky top-0 z-10 font-normal">
                <tr>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[120px]">Tipo de trabajo</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[300px] sticky-col sticky-col-header bg-white">TASKS</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[140px]">Vertical</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[250px]">Brief Description</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[200px]">Specialists</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[200px]">Fecha de Inicio y Fin</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[140px]">Estado</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[180px]">Calidad</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[120px]">Ailil</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[120px]">Victor</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[120px]">Asdrubal</th>
                    <th class="px-3 py-2 font-normal border-r border-gray-200 min-w-[120px]">Melisa</th>
                </tr>
            </thead>
            <tbody id="table-body" class="text-[#37352f]">
                </tbody>
        </table>
    </main>

    <script src="app.js"></script>
</body>
</html>
